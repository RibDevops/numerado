{% extends "base.html" %}
{% block title %}Encaminhar Documento{% endblock %}
{% block content %}
<div class="container mt-4">
    <h4>Encaminhar documento: {{ documento.doc_numero }}/{{ documento.create_at.year }}</h4>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Encaminhar</button>
        <a href="{% url 'lista_numeracao' documento.fk_tipo.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
