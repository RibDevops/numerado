{% extends 'base.html' %}
{% block title %}Pagina Inicial{% endblock %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8">
<form method="POST" enctype="multipart/form-data">
    <h3>Nova Destino</h3>
 
    <!-- Security token -->
    {% csrf_token %}
 
    <!-- Using the formset -->
    {{ form.as_p }}
     
    <input type="submit" class="btn btn-primary" value="Cadastrar">
</form>
</div>
</div>
</div>
{% endblock %}
